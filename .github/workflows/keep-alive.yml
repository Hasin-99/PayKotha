name: Keep PayKotha live

# Pings the production URL so the host stays warm.
# Set repo variable LIVE_URL to your Render URL, e.g. https://paykotha.onrender.com
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/keep-alive.yml"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          LIVE_URL: ${{ vars.LIVE_URL }}
        run: |
          if [ -z "$LIVE_URL" ]; then
            echo "Set repository variable LIVE_URL to your public host (e.g. https://paykotha.onrender.com)"
            exit 0
          fi
          url="${LIVE_URL%/}/api/v1/health"
          echo "Pinging $url"
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/health.json -w "%{http_code}" --max-time 60 "$url" || true)
            echo "attempt $i → HTTP $code"
            if [ "$code" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed"
          exit 1
