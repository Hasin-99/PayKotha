name: Deploy to Render

# Permanent live deploy after the Render service exists.
# Secrets: RENDER_API_KEY
# Vars: RENDER_SERVICE_ID
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "Skip: set secret RENDER_API_KEY and variable RENDER_SERVICE_ID for auto-deploy."
            echo "One-time setup: https://render.com/deploy?repo=https://github.com/Hasin-99/PayKotha"
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -d '{"clearCache":"do_not_clear"}' | tee /tmp/deploy.json
          echo
          grep -q '"id"' /tmp/deploy.json
