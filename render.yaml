# PayKotha — free Render host (single Docker web service)
# Deploy: https://render.com/deploy?repo=https://github.com/Hasin-99/PayKotha
#
# Free plan: no card required. Service may sleep after idle; GitHub keep-alive
# workflow + LIVE_URL variable wake it on a schedule for portfolio use.
services:
  - type: web
    name: paykotha
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: SEED_DEMO
        value: "true"
      - key: DATABASE_URL
        value: sqlite:///./data/paykotha.db
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: RAIL_MODE
        value: sandbox
      - key: REQUIRE_OTP_ABOVE
        value: "5000"
      - key: ADMIN_BOOTSTRAP_PHONE
        value: "01999999999"
      - key: ADMIN_BOOTSTRAP_PIN
        value: "999999"
      - key: PYTHONUNBUFFERED
        value: "1"
